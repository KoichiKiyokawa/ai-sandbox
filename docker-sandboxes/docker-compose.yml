services:
  mysql:
    image: mysql:8.4
    container_name: sandbox-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sandbox
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uapp", "-papp"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: ./app
    container_name: sandbox-api
    restart: unless-stopped
    environment:
      APP_ADDR: :8080
      MYSQL_DSN: app:app@tcp(mysql:3306)/sandbox?parseTime=true
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  mysql-data:
